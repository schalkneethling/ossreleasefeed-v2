name: E2E

on:
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      # Job-level `if:` can't reference the secrets context, so the check
      # runs as a step instead and every later step is gated on its output.
      - name: Check Cloudflare secrets
        id: check-secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      # Cloudflare Pages is connected to this repo via its native Git
      # integration (not deployed from this workflow), so the preview URL
      # for this branch has to be looked up from the Pages API rather than
      # passed in statically — a fixed URL can't reflect an unmerged PR.
      - name: Wait for Cloudflare Pages preview deployment
        id: pages-preview
        if: steps.check-secrets.outputs.configured == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          project="ossreleasefeed"

          fetch_deployments() {
            page=1
            all="[]"
            while :; do
              response=$(curl -s -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${project}/deployments?env=preview&page=${page}")

              # A failed request (e.g. bad token/permissions) still has a `result`
              # field of `null`, which `// []` would otherwise mask as "no
              # deployments yet" and retry silently until the outer timeout.
              success=$(echo "$response" | jq -r '.success // false')
              if [ "$success" != "true" ]; then
                echo "Cloudflare API request failed: $response" >&2
                exit 1
              fi

              all=$(jq -c -s '.[0] + .[1]' \
                <(echo "$all") \
                <(echo "$response" | jq -c '.result // []'))

              total_pages=$(echo "$response" | jq -r '.result_info.total_pages // 1')
              if [ "$page" -ge "$total_pages" ]; then
                break
              fi
              page=$((page + 1))
            done
            echo "$all"
          }

          for _ in $(seq 1 30); do
            deployments=$(fetch_deployments)

            url=$(echo "$deployments" | jq -r --arg branch "$BRANCH" '
              [.[] | select(.deployment_trigger.metadata.branch == $branch)]
              | sort_by(.created_on)
              | last
              | select(.latest_stage.status == "success")
              | .url // empty
            ')

            if [ -n "$url" ]; then
              echo "url=$url" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            sleep 20
          done

          echo "Timed out waiting for a successful Cloudflare Pages preview deployment for branch '${BRANCH}'" >&2
          exit 1

      - name: Setup pnpm
        if: steps.check-secrets.outputs.configured == 'true'
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Setup Node.js
        if: steps.check-secrets.outputs.configured == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.check-secrets.outputs.configured == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        if: steps.check-secrets.outputs.configured == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright E2E
        if: steps.check-secrets.outputs.configured == 'true'
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.pages-preview.outputs.url }}
        run: pnpm run test:e2e
